<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KÁMEN NŮŽKY PAPÍR – Bitva Osudu</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#cc0000;--red2:#ff3333;--gold:#ffd700;--dark:#080808;
  --purple:#8a00cc;--green:#00cc44;--blue:#4488ff;
}
body{
  background:#030303;color:#fff;
  font-family:'Press Start 2P',monospace;
  width:100vw;height:100vh;overflow:hidden;position:relative;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.25) 2px,rgba(0,0,0,.25) 4px);
}
.screen{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}

/* ── TITLE ── */
#screen-title{background:radial-gradient(ellipse at 50% 30%,#1a0000 0%,#000 65%)}
.t-sub{font-size:.55em;color:var(--gold);text-shadow:0 0 15px var(--gold);letter-spacing:8px;margin-bottom:12px}
.t-main{font-size:clamp(1.4em,4vw,2.2em);color:var(--red2);line-height:1.45;
  text-shadow:0 0 20px #f00,0 0 50px #f00,0 0 100px #f40;text-align:center}
.t-ed{font-size:.45em;color:#f60;text-shadow:0 0 10px #f60;letter-spacing:4px;margin-top:10px}
.press{font-size:.5em;color:#fff;animation:blink 1s steps(1) infinite;margin-top:35px}
.fireline{width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);box-shadow:0 0 10px var(--red);margin:20px 0}

/* ── SELECT ── */
#screen-select{background:radial-gradient(ellipse at 50% 50%,#0d0000 0%,#000 80%);gap:0}
.sel-title{font-size:.85em;color:var(--gold);text-shadow:0 0 15px var(--gold);letter-spacing:4px;margin-bottom:6px}
.sel-hint{font-size:.35em;color:#666;margin-bottom:22px}
.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:680px}
.char-card{
  cursor:pointer;border:2px solid #2a2a2a;background:#0a0a0a;
  padding:8px;text-align:center;transition:all .15s;position:relative;
}
.char-card:hover,.char-card.selected{border-color:var(--gold);box-shadow:0 0 18px var(--gold),inset 0 0 15px rgba(255,215,0,.08)}
.char-card svg{width:90px;height:120px;display:block;margin:0 auto 7px}
.char-card .cn{font-size:.42em;color:var(--gold);text-shadow:0 0 8px var(--gold)}
.char-card .ct{font-size:.28em;color:#666;margin-top:3px}

/* ── VS ── */
#screen-vs{background:#000}
.vs-wrap{display:flex;align-items:center;gap:20px;max-width:860px;width:100%;justify-content:center;padding:0 16px}
.vs-side{text-align:center;flex:1}
.vs-side svg{width:min(130px,30vw);height:auto;display:block;margin:0 auto 10px}
.vs-name{font-size:clamp(.45em,.75em,1em);color:var(--gold);text-shadow:0 0 12px var(--gold)}
.vs-txt{font-size:clamp(2em,8vw,3.5em);color:var(--red2);text-shadow:0 0 30px #f00,0 0 60px #f00;animation:pulse .45s infinite alternate;flex-shrink:0}

/* ── ARENA ── */
#screen-arena{
  background:radial-gradient(ellipse at 50% 110%,#1a0000 0%,transparent 55%),
             radial-gradient(ellipse at 50% -10%,#0d0011 0%,transparent 50%),#050505;
  flex-direction:column;justify-content:space-between;padding:0;
}
.lifebars{
  width:100%;display:flex;align-items:center;gap:8px;
  padding:6px 12px;background:rgba(0,0,0,.85);border-bottom:2px solid var(--red);
  flex-shrink:0;
}
.lb-wrap{flex:1;display:flex;flex-direction:column;gap:5px}
.lb-wrap.cpu{align-items:flex-end}
.lb-lbl{font-size:.6em;color:var(--gold);text-shadow:0 0 6px var(--gold)}
.lb-track{width:100%;height:22px;background:#111;border:1px solid #333;overflow:hidden;position:relative}
.lb-fill{height:100%;background:linear-gradient(90deg,#a00,#f30,#f60);box-shadow:0 0 8px #f30;transition:width .5s ease}
.lb-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.15)}
.lb-fill.cpu-fill{float:right}
.round-box{text-align:center;white-space:nowrap;min-width:80px}
.round-lbl{font-size:.65em;color:#fff;text-shadow:0 0 6px #fff}
.dots{display:flex;gap:5px;justify-content:center;margin-top:4px}
.dot{width:11px;height:11px;border-radius:50%;border:1px solid #555}
.dot.on{background:var(--gold);box-shadow:0 0 6px var(--gold);border-color:var(--gold)}
.dot-sep{font-size:.25em;color:#333;text-align:center;margin:2px 0}

.arena-mid{display:flex;align-items:center;justify-content:center;width:100%;flex:1;padding:10px 16px;gap:20px;min-height:0;max-width:720px;align-self:center;overflow:hidden}
.af{display:flex;flex-direction:column;align-items:center;gap:6px}
.af-portrait{position:relative;transition:transform .3s}
.af-portrait svg{width:min(110px,22vw);height:auto;display:block}
.af-portrait.win{animation:winBounce .5s ease infinite alternate;filter:drop-shadow(0 0 20px gold)!important}
.af-portrait.lose{animation:loseFall .5s ease forwards;filter:grayscale(.6) brightness(.5)!important}
.af-portrait.draw{animation:drawShake .25s ease infinite alternate}
.hand-em{font-size:clamp(1.8em,5vw,2.8em);height:50px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 8px #f30)}
.hand-em.flipped{transform:scaleX(-1)}

.arena-ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;flex:1;min-width:80px}
.cntdown{font-size:clamp(2em,8vw,4em);color:var(--red2);text-shadow:0 0 25px #f00,0 0 50px #f00;height:60px;display:flex;align-items:center;justify-content:center}
.round-result{font-size:clamp(.45em,2vw,.85em);text-align:center;height:40px;display:flex;align-items:center;justify-content:center}

.choice-bar{
  display:flex;gap:12px;padding:12px 16px;
  background:rgba(0,0,0,.8);border-top:2px solid var(--red);
  width:100%;justify-content:center;flex-shrink:0;
}
.cbtn{
  font-family:'Press Start 2P',monospace;font-size:.5em;
  padding:10px 16px;cursor:pointer;border:2px solid var(--gold);
  background:rgba(0,0,0,.8);color:var(--gold);text-shadow:0 0 6px var(--gold);
  box-shadow:0 0 10px rgba(255,215,0,.25);transition:all .1s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.cbtn:hover{background:rgba(255,215,0,.12);box-shadow:0 0 20px rgba(255,215,0,.5);transform:scale(1.06)}
.cbtn:active{transform:scale(.95)}
.cbtn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.cbtn .bi{font-size:2em}

/* ── FINISH ── */
#screen-finish{background:radial-gradient(ellipse at 50% 50%,#1a0000 0%,#000 70%)}
.fin-title{font-size:clamp(.9em,3vw,1.6em);color:var(--gold);text-shadow:0 0 20px var(--gold),0 0 40px #f80;letter-spacing:6px;margin-bottom:8px;animation:flash .5s infinite alternate}
.fin-name{font-size:clamp(1em,3.5vw,2em);color:var(--red2);text-shadow:0 0 30px #f00,0 0 60px #f00;margin-bottom:18px}
#fin-portrait svg{width:170px;height:225px;display:block;margin:0 auto 16px;animation:riseUp 1s ease-out}
.fin-tag{font-size:.45em;color:#f60;text-shadow:0 0 10px #f60;letter-spacing:3px;margin-bottom:14px}
.fin-score{font-size:.4em;color:#666;margin-bottom:28px}
.btn-again{font-family:'Press Start 2P',monospace;font-size:.55em;padding:14px 28px;background:var(--red);color:#fff;border:3px solid var(--gold);cursor:pointer;text-shadow:0 0 6px #fff;box-shadow:0 0 20px var(--red);animation:blink 1.5s steps(1) infinite}
.btn-again:hover{background:var(--red2);box-shadow:0 0 30px var(--red2);animation:none}

/* ── MK MESSAGE ── */
.mk-msg{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(1.2em,4vw,2.2em);pointer-events:none;z-index:500;
  opacity:0;white-space:nowrap;animation:mkPop 1.6s ease-out forwards;
}

/* ── KEYFRAMES ── */
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
@keyframes winBounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-14px) scale(1.05)}}
@keyframes loseFall{0%{transform:rotate(0deg) translateY(0)}100%{transform:rotate(-22deg) translateY(18px)}}
@keyframes drawShake{from{transform:translateX(-4px)}to{transform:translateX(4px)}}
@keyframes cdPop{from{transform:scale(1.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes flash{from{opacity:1}to{opacity:.65}}
@keyframes riseUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes mkPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  18%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  35%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}
}
</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen active">

<!-- ARENA -->
<div id="screen-arena" class="screen">

      <div class="lb-lbl" id="lb-pname">HRÁČ</div>
      <div class="lb-track"><div class="lb-fill" id="lb-p" style="width:100%"></div></div>

    <button class="cbtn" onclick="pick('paper')"><span class="bi">🖐️</span>PAPÍR</button>
  </div>
</div>

<!-- FINISH -->
<div id="screen-finish" class="screen">

  <button class="btn-again" onclick="resetGame()">▶ HRÁT ZNOVU ◀</button>
</div>

<script>
// ─── AUDIO ───────────────────────────────────────────────────────
let AC = null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC}
function note(f,t,dur,type='square',vol=.35){
  const o=ac().createOscillator(),g=ac().createGain();
  o.connect(g);g.connect(ac().destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur);
}
function sndHit(){
  const t=ac().currentTime;
  note(180,t,.06,'sawtooth',.6);note(90,t+.06,.12,'sawtooth',.5);
  const b=ac().createBuffer(1,ac().sampleRate*.08,ac().sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;
  const s=ac().createBufferSource(),g=ac().createGain();
  s.buffer=b;g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
  s.connect(g);g.connect(ac().destination);s.start(t);
}
function sndTick(){note(440,ac().currentTime,.08,'square',.4)}
function sndGo(){const t=ac().currentTime;note(880,t,.1,'square',.5);note(1100,t+.1,.15,'square',.5)}
function sndRoundW(){const t=ac().currentTime;[523,659,784,659,1047].forEach((f,i)=>note(f,t+i*.12,.18,'square',.4))}
function sndRoundL(){const t=ac().currentTime;[400,320,260,200].forEach((f,i)=>note(f,t+i*.1,.15,'sawtooth',.4))}
function sndDraw(){const t=ac().currentTime;[440,440].forEach((f,i)=>note(f,t+i*.15,.1,'square',.3))}
function sndMatchW(){
  const t=ac().currentTime;
  const m=[523,523,523,415,466,523,466,523,784],d=[.1,.1,.1,.1,.1,.2,.1,.1,.6];
  let off=0;m.forEach((f,i)=>{note(f,t+off,d[i]+.1,'square',.5);off+=d[i]});
  [130,130,196].forEach((f,i)=>note(f,t+i*.3,.4,'sawtooth',.3));
}
function sndMatchL(){const t=ac().currentTime;[523,415,349,261,196].forEach((f,i)=>note(f,t+i*.2,.25,'sawtooth',.4))}

// ─── BACKGROUND MUSIC ────────────────────────────────────────────
// Melodie: d-moll, MK chiptune styl
const BG_MELODY=[294,294,261,233,220,196,220,233,261,220,196,175,196,220,294,0];
const BG_BASS  =[73, 0, 110,0, 117,0, 110,0, 73, 0, 110,0, 117,0, 110,0];
const BG_STEP=0.2; // délka jednoho kroku v sekundách
let bgGain=null,bgOn=false,bgHandle=null;

function getBgGain(){
  if(!bgGain){bgGain=ac().createGain();bgGain.connect(ac().destination);bgGain.gain.value=.45;}
  return bgGain;
}
function noteG(f,t,dur,type,vol,gn){
  const o=ac().createOscillator(),g=ac().createGain();
  o.connect(g);g.connect(gn);o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur);
}
function loopBg(){
  if(!bgOn)return;
  const t=ac().currentTime,gn=getBgGain();
  BG_MELODY.forEach((f,i)=>{if(f>0)noteG(f,t+i*BG_STEP,BG_STEP*.78,'square',.28,gn);});
  BG_BASS.forEach((f,i)=>{if(f>0)noteG(f,t+i*BG_STEP,BG_STEP*.55,'sawtooth',.18,gn);});
  // Bicí — kick na 1. a 3. dobu, snare na 2. a 4.
  [0,4,8,12].forEach(b=>noteG(60,t+b*BG_STEP,.1,'sawtooth',.3,gn));
  [2,6,10,14].forEach(b=>noteG(200,t+b*BG_STEP,.06,'sawtooth',.12,gn));
  bgHandle=setTimeout(loopBg,(BG_MELODY.length*BG_STEP-.18)*1000);
}
function startBgMusic(){
  if(bgOn)return;bgOn=true;
  getBgGain().gain.setValueAtTime(.45,ac().currentTime);
  loopBg();
}
function stopBgMusic(){
  bgOn=false;if(bgHandle)clearTimeout(bgHandle);
  if(bgGain)bgGain.gain.setTargetAtTime(0,ac().currentTime,.4);
}

svg:`<rect width="120" height="160" fill="#0d0400"/>

// ─── GAME STATE ───────────────────────────────────────────────────
const CHOICES={
  rock:    {label:'KÁMEN',  e:'✊', beats:'scissors'},
  scissors:{label:'NŮŽKY', e:'✌️', beats:'paper'},
  paper:   {label:'PAPÍR',  e:'🖐️', beats:'rock'}
};
let G={pChar:null,cChar:null,pWins:0,cWins:0,round:1,busy:false,maxW:3};

// ─── UTILS ───────────────────────────────────────────────────────
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active')}
function mkSVG(content,w=120,h=160){return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${content}</svg>`}

// ─── BUILD SELECT ────────────────────────────────────────────────
function buildSelect(){
  const g=document.getElementById('char-grid');
  g.innerHTML='';
  chars.forEach(c=>{
    const d=document.createElement('div');
    d.className='char-card';
    d.innerHTML=`${mkSVG(c.svg,120,160)}<div class="cn">${c.name}</div><div class="ct">${c.title}</div>`;
    d.onclick=()=>pickChar(c);
    g.appendChild(d);
  });
}

function pickChar(c){
  stopBgMusic();
  G.pChar=c;
  const others=chars.filter(x=>x.id!==c.id);
  G.cChar=others[Math.floor(Math.random()*others.length)];
  document.querySelectorAll('.char-card').forEach((el,i)=>el.classList.toggle('selected',chars[i].id===c.id));
  setTimeout(showVS,400);
}

// ─── VS SCREEN ───────────────────────────────────────────────────
function showVS(){
  document.getElementById('vsp-p').innerHTML=G.pChar.svg;
  document.getElementById('vsp-c').innerHTML=G.cChar.svg;
  document.getElementById('vsn-p').textContent=G.pChar.name;
  document.getElementById('vsn-c').textContent=G.cChar.name;
  showScreen('vs');
  setTimeout(startArena,2600);
}

// ─── ARENA ───────────────────────────────────────────────────────
function startArena(){
  G.pWins=0;G.cWins=0;G.round=1;G.busy=false;
  showScreen('arena');
  document.getElementById('lb-pname').textContent=G.pChar.name;
  document.getElementById('lb-cname').textContent=G.cChar.name;
  setPortraits();updateBars();updateDots();updateRoundLbl();
  showButtons(true);
  document.getElementById('cntdown').textContent='';
  document.getElementById('round-res').innerHTML='';
}

function setPortraits(){
  document.getElementById('af-p').innerHTML=`<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 14px ${G.pChar.color})">${G.pChar.svg}</svg>`;
  document.getElementById('af-c').innerHTML=`<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg" style="transform:scaleX(-1);filter:drop-shadow(0 0 14px ${G.cChar.color})">${G.cChar.svg}</svg>`;
  document.getElementById('af-p').className='af-portrait';
  document.getElementById('af-c').className='af-portrait';
}

function updateBars(){
  const m=G.maxW;
  document.getElementById('lb-p').style.width=Math.max(0,(m-G.cWins)/m*100)+'%';
  document.getElementById('lb-c').style.width=Math.max(0,(m-G.pWins)/m*100)+'%';
}

function updateDots(){
  const pd=document.getElementById('p-dots'),cd=document.getElementById('c-dots');
  pd.innerHTML='';cd.innerHTML='';
  for(let i=1;i<=G.maxW;i++){
    pd.innerHTML+=`<div class="dot${i<=G.pWins?' on':''}"></div>`;
    cd.innerHTML+=`<div class="dot${i<=G.cWins?' on':''}"></div>`;
  }
}

function updateRoundLbl(){document.getElementById('round-lbl').textContent='KOLO '+G.round}

function showButtons(show){
  document.getElementById('choice-bar').style.display=show?'flex':'none';
  document.getElementById('hand-p').style.display='none';
  document.getElementById('hand-c').style.display='none';
}

// ─── PICK ────────────────────────────────────────────────────────
async function pick(choice){
  if(G.busy)return;G.busy=true;
  showButtons(false);
  sndHit();
  const cpuPicks=['rock','scissors','paper'];
  const cpuChoice=cpuPicks[Math.floor(Math.random()*3)];

  document.getElementById('hand-p').textContent='✊';
  document.getElementById('hand-c').textContent='✊';
  document.getElementById('hand-p').style.display='flex';
  document.getElementById('hand-c').style.display='flex';

  await countdown();

  document.getElementById('hand-p').textContent=CHOICES[choice].e;
  document.getElementById('hand-c').textContent=CHOICES[cpuChoice].e;
  sndGo();
  await sleep(300);

  let res=(choice===cpuChoice)?'draw':(CHOICES[choice].beats===cpuChoice)?'player':'cpu';
  await handleResult(res);
}

async function countdown(){
  const el=document.getElementById('cntdown');
  for(const n of['3','2','1']){
    el.textContent=n;el.style.animation='none';void el.offsetWidth;el.style.animation='cdPop .3s ease';
    sndTick();await sleep(600);
  }
  el.textContent='!';el.style.animation='none';void el.offsetWidth;el.style.animation='cdPop .2s ease';
  await sleep(300);el.textContent='';
}

async function handleResult(res){
  const pp=document.getElementById('af-p'),pc=document.getElementById('af-c');
  const rr=document.getElementById('round-res');
  pp.className='af-portrait';pc.className='af-portrait';

  if(res==='player'){
    G.pWins++;pp.classList.add('win');pc.classList.add('lose');
    rr.innerHTML='<span style="color:#ffd700;text-shadow:0 0 20px gold;font-size:.75em">VÍTĚZ KOLA!</span>';
    mkMsg('VÍTĚZ KOLA!','#ffd700');sndRoundW();
  }else if(res==='cpu'){
    G.cWins++;pp.classList.add('lose');pc.classList.add('win');
    rr.innerHTML='<span style="color:#cc0000;text-shadow:0 0 18px #f00;font-size:.75em">PORAŽEN!</span>';
    mkMsg('PORAŽEN!','#cc0000');sndRoundL();
  }else{
    pp.classList.add('draw');pc.classList.add('draw');
    rr.innerHTML='<span style="color:#ff8800;text-shadow:0 0 14px #f80;font-size:.75em">REMÍZA!</span>';
    mkMsg('REMÍZA!','#ff8800');sndDraw();
  }

  updateBars();updateDots();
  await sleep(2000);

  if(G.pWins>=G.maxW||G.cWins>=G.maxW){showFinish();return;}
  if(res!=='draw')G.round++;
  updateRoundLbl();
  rr.innerHTML='';setPortraits();
  G.busy=false;showButtons(true);
}

// ─── MK MESSAGE ──────────────────────────────────────────────────
function mkMsg(text,color){
  document.querySelectorAll('.mk-msg').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='mk-msg';el.textContent=text;el.style.color=color;
  el.style.textShadow=`0 0 20px ${color},0 0 40px ${color}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

// ─── FINISH ──────────────────────────────────────────────────────
function showFinish(){
  stopBgMusic();
  const won=G.pWins>=G.maxW;
  const winner=won?G.pChar:G.cChar;
  if(won){sndMatchW();document.getElementById('fin-title').textContent='DOKONÁNO!';document.getElementById('fin-title').style.color='#ffd700';}
  else{sndMatchL();document.getElementById('fin-title').textContent='PORAŽEN!';document.getElementById('fin-title').style.color='#cc0000';}
  document.getElementById('fin-name').textContent=winner.name;
  document.getElementById('fin-tag').textContent=won?winner.tagline:'ZKUS TO ZNOVU, BOJOVNÍKU...';
  document.getElementById('fin-score').textContent=G.pChar.name+': '+G.pWins+' — '+G.cChar.name+': '+G.cWins;
  document.getElementById('fin-portrait').innerHTML=`<svg viewBox="0 0 120 160" style="width:160px;height:210px;filter:drop-shadow(0 0 28px ${winner.color})" xmlns="http://www.w3.org/2000/svg">${winner.svg}</svg>`;
  showScreen('finish');
}

// ─── RESET ───────────────────────────────────────────────────────
function resetGame(){
  G={pChar:null,cChar:null,pWins:0,cWins:0,round:1,busy:false,maxW:3};
  buildSelect();showScreen('select');
}

// ─── INIT ────────────────────────────────────────────────────────
document.getElementById('screen-title').addEventListener('click',()=>{startBgMusic();buildSelect();showScreen('select')});
document.addEventListener('keydown',e=>{
  const a=document.querySelector('.screen.active');if(!a)return;
  if(a.id==='screen-title'){startBgMusic();buildSelect();showScreen('select');}
  if(a.id==='screen-arena'&&!G.busy){
    if(e.key==='1'||e.key==='q'||e.key==='Q')pick('rock');
    if(e.key==='2'||e.key==='w'||e.key==='W')pick('scissors');
    if(e.key==='3'||e.key==='e'||e.key==='E')pick('paper');
  }
});
</script>
</body>
